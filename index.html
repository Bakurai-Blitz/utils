    .fucktwice {
      display: grid;

      grid-template-rows: auto;
      gap: 15px;
      margin: 0 auto; 
      width: 90%;
      max-width: 1000px;
    }
    
    .block{
      opacity: 0;
      background-color: rgba(255,255,255,0.09);
       cursor: pointer;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 2rem 2rem 2rem;
      transition: 0.2s ease; 
      animation: comein linear forwards;
      animation-timeline: view();
      animation-range: cover 0% cover 100% ;
    }
    /*  cover is how much part the object covered on the vh and entry means how much part of the object is visible */
    
      @keyframes comein {
        0% {  opacity: 0;}
        25%,75% {  opacity: 1;}
        100% {  opacity: 0;}
          
      }
    .block:hover {
      scale: 1.1;
      box-shadow: 0 0 10px white;
      z-index: 20;
    }
    
    .block:active {
      scale: 0.8;
      z-index: 20;
    }
    
    .block h1 {
      font-size: 1.2rem;
      word-wrap: break-word;
      text-align: center;
      color: white;
      outline: none;

    }
